  <style>:root {
  color-scheme: light dark;
  --font-serif: "Anthropic Serif", Georgia, "Times New Roman", serif;
}
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
input,
select,
textarea,
button {
  font-family: inherit;
}
body {
  font-family:
    "Anthropic Sans",
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
  background: transparent;
}
/* Iframe height is externally managed — host sets iframe.style.height to
 * match body.getBoundingClientRect().height via postMessage. During the
 * 1-frame lag (and the 0.25s initial transition), body > viewport triggers
 * a transient scrollbar that steals ~15px width, reflowing flex content.
 * Zero-width scrollbar = zero layout shift. Wheel/keyboard scroll still
 * work if ever needed. */
html,
body {
  scrollbar-width: none;
}
html::-webkit-scrollbar,
body::-webkit-scrollbar {
  width: 0;
  height: 0;
}
/* Short var aliases — saves ~5 tokens per reference */
:root {
  --p: var(--color-text-primary);
  --s: var(--color-text-secondary);
  --t: var(--color-text-tertiary);
  --bg2: var(--color-background-secondary);
  --b: var(--color-border-secondary);
}

/* SVG utility classes — use class="t" instead of repeating font/fill attrs */
.t {
  font-size: 14px;
  fill: var(--p);
}
.ts {
  font-size: 12px;
  fill: var(--s);
}
.th {
  font-size: 14px;
  fill: var(--p);
  font-weight: 500;
}
.box {
  fill: var(--bg2);
  stroke: var(--b);
}
.arr {
  stroke: var(--t);
  fill: none;
  stroke-width: 1.5;
}
.node {
  cursor: pointer;
}
.node:hover rect,
.node:hover .box {
  filter: brightness(0.97);
}
.node:hover text {
  opacity: 0.8;
}

/* Form element defaults — model writes bare <input>, styling is automatic */
/* :not(form.elicit *) — elicitation form provides its own
 * input/button styling at (0,1,0). Without this exclusion, these
 * generic rules at (0,3,1) / (1,0,2) clobber every .elicit-* class. */
input:not([type="range"]):not([type="checkbox"]):not([type="radio"]):not(
    form.elicit *
  ),
select:not(form.elicit *),
textarea:not(form.elicit *) {
  width: 100%;
  height: 36px;
  padding: 8px 12px;
  font-size: 16px;
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 6px;
  outline: none;
  transition:
    border-color 0.15s,
    box-shadow 0.15s;
}
textarea {
  height: auto;
  min-height: 80px;
  resize: vertical;
}
input:not([type="range"]):not([type="checkbox"]):not([type="radio"]):not(
    form.elicit *
  ):hover,
select:not(form.elicit *):hover,
textarea:not(form.elicit *):hover {
  border-color: var(--color-border-secondary);
}
input:not([type="range"]):not([type="checkbox"]):not([type="radio"]):not(
    form.elicit *
  ):focus,
select:not(form.elicit *):focus,
textarea:not(form.elicit *):focus {
  border-color: var(--color-border-info);
  box-shadow: 0 0 0 3px var(--color-background-info);
}
select {
  cursor: pointer;
}

/* Range slider — model writes bare <input type="range">, styling automatic */
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  background: light-dark(rgba(0, 0, 0, 0.08), rgba(255, 255, 255, 0.1));
  border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--color-background-primary);
  border: 1px solid var(--color-border-secondary);
  cursor: pointer;
  transition:
    border-color 0.15s,
    transform 0.15s;
}
input[type="range"]:hover::-webkit-slider-thumb {
  border-color: var(--color-border-primary);
  transform: scale(1.1);
}
input[type="range"]::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--color-background-primary);
  border: 1px solid var(--color-border-secondary);
  cursor: pointer;
}

/* Button defaults — model writes bare <button>, interaction states automatic */
button:not(#action-btns button):not(form.elicit button) {
  padding: 8px 16px;
  font-size: 14px;
  background: transparent;
  color: var(--color-text-primary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  cursor: pointer;
  transition:
    background 0.15s,
    transform 0.1s;
}
button:not(#action-btns button):not(form.elicit button):hover {
  background: var(--color-background-secondary);
}
button:not(#action-btns button):not(form.elicit button):active {
  background: var(--color-border-tertiary);
  transform: scale(0.98);
}

/* ===== Elicitation form — EA-878 =====
 * Inert unless Claude writes <form class="elicit">.
 * Figma: AaGSDTRrOCNVhNa7LZaJVr node 5340:3930
 * Conversational question prompts ("Which side are you on?"),
 * pills for all choices.
 */

form.elicit {
  background: var(--color-background-primary, #fff);
  border: 0.5px solid var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
  border-radius: 16px;
  /* Figma 5340:3930 — soft diffuse shadow, lighter than DS --shadow-md.
   * Margin keeps the shadow from clipping at #vis-container's overflow:hidden
   * edge: y-offset 4px + blur 20px ≈ 24px below, 20px sides. */
  box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.04);
  margin: 4px 20px 24px;
  overflow: hidden;
  /* font-base = 14/1.4 sans — descendants inherit; only .elicit-question
   * (serif 16/1.7), .name (12), .badge (9) override. */
  font-family: var(--font-sans, system-ui, sans-serif);
  font-size: 14px;
  line-height: 1.4;
  /* Match host rendering — without this the iframe uses subpixel AA and
   * everything (notably weight-500 buttons) reads ~100 heavier on Retina
   * than the same tokens outside the iframe. */
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  /* Chrome props animate on the form→submitted-summary swap. */
  transition:
    background-color 200ms ease-out,
    box-shadow 200ms ease-out,
    border-radius 200ms ease-out,
    padding 200ms ease-out,
    margin 200ms ease-out;
  /* Shared FileThumbnail tokens (border-border-300/25, shadow-sm/5). */
  --elicit-border-faint: color-mix(
    in srgb,
    var(--color-border-tertiary, rgba(31, 30, 29, 0.15)) 25%,
    transparent
  );
  --elicit-shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
}
/* Form controls don't inherit font props from the UA sheet — pull from root.
 * `font: inherit` shorthand so font-weight comes too; the individual-prop
 * version left weight at the UA <button> default (bold-ish on some
 * platforms) for any control that doesn't set its own weight. */
form.elicit :is(button, input, textarea) {
  font: inherit;
}

/* Header title and question prompts share Claude's chat-output voice
 * (p.font-claude-response-body = Anthropic Serif 16 / 400 / 1.7) so both
 * read as Claude speaking, not form chrome. */
form.elicit .elicit-header,
form.elicit .elicit-question {
  font-family: var(--font-serif, "Anthropic Serif", Georgia, serif);
  font-size: 16px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--color-text-primary, #131313);
}

/* 44px total to match the suggested-connector widget spec.
 * Fixed height + zero vertical padding lets align-items:center handle the rest;
 * avoids the icon/text line-height arithmetic. */
form.elicit .elicit-header {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 44px;
  padding: 0 16px;
  border-bottom: 0.5px solid
    var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
}
form.elicit .elicit-header > svg {
  /* IconBase vectorSizeMap[16] = 20 — anthropicons render in a 20px box. */
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  fill: currentColor;
}
form.elicit .elicit-header > span {
  flex: 1;
}

form.elicit .elicit-body {
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

form.elicit .elicit-group {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

form.elicit .elicit-question {
  margin: 0;
}

/* Pills container — no horizontal padding. Previously had 0 8px which pushed
 * pills 8px right of the question/textarea/date in the same .elicit-group. */
form.elicit .elicit-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
form.elicit .elicit-pill {
  /* Fully rounded + tighter padding — visually distinct from the rectangular
   * text inputs (textarea/other/date stay at 8-12px radius). Pills and inputs
   * don't match in height so the shape difference reads as intentional. */
  padding: 8px 12px;
  border: 0.5px solid var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
  border-radius: 9999px;
  background: transparent;
  color: var(--color-text-secondary, #383835);
  cursor: pointer;
  transition:
    border-color 120ms ease,
    background-color 120ms ease;
}
form.elicit .elicit-pill:hover {
  border-color: var(--color-border-secondary, rgba(30, 30, 29, 0.3));
}
/* Semantic accents — same light-fill+soft-border recipe as the blue selected
 * state, applied via attribute so inline style doesn't fight aria-pressed.
 * Single-attr specificity; the [aria-pressed="true"] rule below wins on
 * border+bg so selection remains visible on accented pills. */
form.elicit .elicit-pill[data-accent="warning"] {
  border-color: var(--color-text-warning, #5a4815);
  background: color-mix(
    in srgb,
    var(--color-text-warning, #5a4815) 15%,
    transparent
  );
  color: var(--color-text-warning, #5a4815);
}
form.elicit .elicit-pill[data-accent="danger"] {
  border-color: var(--color-text-danger, #7f2c28);
  background: color-mix(
    in srgb,
    var(--color-text-danger, #7f2c28) 15%,
    transparent
  );
  color: var(--color-text-danger, #7f2c28);
}
form.elicit .elicit-pill[data-accent="success"] {
  border-color: var(--color-text-success, #265b19);
  background: color-mix(
    in srgb,
    var(--color-text-success, #265b19) 15%,
    transparent
  );
  color: var(--color-text-success, #265b19);
}
form.elicit .elicit-pill[aria-pressed="true"] {
  /* Figma: 0.5px #184f95 border + rgba(205,226,251,0.5) fill (approx via color-mix). */
  border: 0.5px solid var(--color-text-info, #184f95);
  background: color-mix(
    in srgb,
    var(--color-text-info, #184f95) 15%,
    transparent
  );
  /* accent-000 — host bridge maps DS accent to --color-text-info (no
   * --accent-* var injected into the iframe). Matches border + fill. */
  color: var(--color-text-info, #184f95);
}

/* "Other" conditional text input.
 * background/color explicit — generic input rule no longer provides
 * these post-specificity-fix, UA Canvas/CanvasText mismatch in dark mode. */
form.elicit .elicit-other {
  margin-top: 8px;
  height: 40px;
  padding: 0 12px;
  border: 0.5px solid var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
  border-radius: 8px;
  background: var(--color-background-primary, #fff);
  color: var(--color-text-primary, #131313);
  width: 100%;
  box-sizing: border-box;
}
form.elicit .elicit-other[hidden] {
  display: none;
}

/* Textarea.
 * background/color explicit — generic textarea rule no longer provides
 * these post-specificity-fix, UA Canvas/CanvasText mismatch in dark mode. */
form.elicit .elicit-textarea {
  min-height: 84px;
  padding: 12px;
  border: 0.5px solid var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
  border-radius: 8px;
  background: var(--color-background-primary, #fff);
  color: var(--color-text-primary, #131313);
  resize: vertical;
  box-sizing: border-box;
  width: 100%;
}
form.elicit .elicit-textarea::placeholder {
  color: var(--color-text-tertiary, #7b7974);
}

/* Date input — pill-shaped, hugs content */
form.elicit .elicit-date {
  padding: 12px 16px;
  border: 0.5px solid var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
  border-radius: 12px;
  background: transparent;
  color: var(--color-text-primary, #131313);
  width: fit-content;
  cursor: pointer;
}
/* Shared focus ring for all text inputs — info-blue border + soft glow */
form.elicit .elicit-other:focus,
form.elicit .elicit-textarea:focus,
form.elicit .elicit-date:focus {
  outline: none;
  border-color: var(--color-border-info, #2a78d6);
  box-shadow: 0 0 0 3px var(--color-background-info, rgba(42, 120, 214, 0.2));
}

/* File upload — dashed dropzone + filled tiles.
 * Tile styling mirrors packages/chat/components/FileThumbnail.tsx (the
 * thumbnail users already see in the chat input row) so a file picked here
 * reads as the same object it becomes once attached. Dropzone is the first
 * flex child; tiles append after it (flow right). */
form.elicit .elicit-files {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-start;
  gap: 12px;
}
form.elicit .elicit-dropzone {
  /* 120×120 = FileThumbnail SIZE_MAP.normal. Dashed stays 1px — 0.5px
   * dashed rasterizes to invisible gaps on non-retina. */
  width: 120px;
  height: 120px;
  border: 1px dashed var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
  border-radius: 10px;
  box-shadow: var(--elicit-shadow-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  /* Figma 5340:4071 — 2% text-000 wash over bg-000 */
  background: color-mix(
    in srgb,
    var(--color-text-primary, #131313) 2%,
    var(--color-background-primary, #fff)
  );
  color: var(--color-text-tertiary, #7b7974);
  transition:
    border-color 120ms ease,
    background-color 120ms ease;
}
form.elicit .elicit-dropzone:hover {
  border-color: var(--color-text-info, #184f95);
  background: color-mix(
    in srgb,
    var(--color-text-info, #184f95) 4%,
    transparent
  );
}
form.elicit .elicit-dropzone svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
}
form.elicit .elicit-dropzone input[type="file"] {
  display: none;
}

form.elicit .elicit-file-tile {
  /* FileThumbnail ThumbnailInteractionContainer:
   * rounded-lg border-0.5 border-border-300/25 shadow-sm shadow-always-black/5
   * bg-bg-000 px-2.5 py-2 gap-2.5 → 8px radius, 0.5px border, 8/10px pad */
  width: 120px;
  height: 120px;
  border: 0.5px solid var(--elicit-border-faint);
  border-radius: 8px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 10px;
  background: var(--color-background-primary, #fff);
  box-shadow: var(--elicit-shadow-sm);
  box-sizing: border-box;
  position: relative;
}
form.elicit .elicit-file-tile .name {
  /* FileThumbnail title: text-[12px] text-text-100 break-words line-clamp-3 */
  font-size: 12px;
  color: var(--color-text-primary, #131313);
  word-break: break-word;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}
form.elicit .elicit-file-tile .badge {
  /* FileThumbnail ThumbnailTagContainer:
   * h-[18px] px-1 border-0.5 border-border-300/25 shadow-sm rounded
   * bg-bg-000/70 font-medium + inner text-[9px] uppercase font-bold */
  align-self: flex-start;
  height: 18px;
  padding: 0 4px;
  display: inline-flex;
  align-items: center;
  border: 0.5px solid var(--elicit-border-faint);
  border-radius: 4px;
  background: color-mix(
    in srgb,
    var(--color-background-primary, #fff) 70%,
    transparent
  );
  box-shadow: var(--elicit-shadow-sm);
  font-size: 9px;
  font-weight: 700;
  color: var(--color-text-tertiary, #7b7974);
  text-transform: uppercase;
}
/* FileThumbnail RemoveButton: w-5 h-5 -top-2 -left-2 rounded-full
 * border-0.5 border-border-300/25 bg-bg-000/90 backdrop-blur-sm.
 * Always visible (no group-hover in iframe — touch + no Tailwind group). */
form.elicit .elicit-file-tile .remove {
  position: absolute;
  top: -8px;
  left: -8px;
  width: 20px;
  height: 20px;
  padding: 0;
  border: 0.5px solid var(--elicit-border-faint);
  border-radius: 9999px;
  background: color-mix(
    in srgb,
    var(--color-background-primary, #fff) 90%,
    transparent
  );
  backdrop-filter: blur(4px);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  color: var(--color-text-tertiary, #7b7974);
  display: flex;
  align-items: center;
  justify-content: center;
  transition:
    color 120ms ease,
    background-color 120ms ease;
}
form.elicit .elicit-file-tile .remove:hover {
  color: var(--color-text-secondary, #383835);
  background: color-mix(
    in srgb,
    var(--color-background-primary, #fff) 50%,
    transparent
  );
}

/* Footer — DS Button tokens transcribed (variant=secondary / variant=primary,
 * size=default: h-9 px-4 rounded-lg min-w-[5rem] font-base-bold). */
form.elicit .elicit-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 12px;
  /* Explicit height (mirrors .elicit-header) so the submitted-state height:0
   * transition can interpolate — auto→0 snaps. 36px buttons + 32px breathing room. */
  height: 68px;
  padding: 0 24px;
  border-top: 0.5px solid var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
}
form.elicit .elicit-skip,
form.elicit .elicit-submit {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 36px;

/* Mermaid class/ER diagrams — match house aesthetic.
   Mermaid v11 class/ER renderers use <path> (not <rect>) with inline stroke/fill
   attrs that IGNORE themeVariables mainBkg/nodeBorder. Labels are
   <foreignObject><div><span class="nodeLabel"><p>text</p> — NOT <text>. All style
   fixes require !important to beat inline attrs + mermaid's inline <style>.
   Selectors target .classDiagram/.erDiagram SVG root classes (always present)
   rather than a .mermaid wrapper (which the model sometimes omits). */
svg.classDiagram,
svg.erDiagram {
  font-size: 13px;
  max-width: 100%;
  height: auto;
}
/* Mermaid sizes foreignObject to fit measured text width. If we upsize post-render,
   text clips. So: overflow visible on FO, and widen inner div past its max-width. */
svg.classDiagram foreignObject,
svg.erDiagram foreignObject {
  overflow: visible;
}
svg.classDiagram foreignObject > div,
svg.erDiagram foreignObject > div {
  max-width: none !important;
}
/* Body text: members, methods, attribute rows */
svg.classDiagram .nodeLabel,
svg.erDiagram .nodeLabel,
svg.classDiagram .label foreignObject div,
svg.erDiagram .label foreignObject div {
  font-family: var(--font-sans) !important;
  font-size: 13px !important;
  font-weight: 400 !important;
  color: var(--color-text-secondary) !important;
}
/* Titles: classDiagram wraps in .label-group; erDiagram wraps in .name */
svg.classDiagram .label-group .nodeLabel,
svg.erDiagram .name .nodeLabel {
  font-size: 14px !important;
  font-weight: 500 !important;
  color: var(--color-text-primary) !important;
}
/* Kill mermaid's inline style="font-weight: bolder" on the .label wrapper */
svg.classDiagram .label-group .label {
  font-weight: 500 !important;
}
/* Edge labels (relationship verbs + cardinality) */
svg.classDiagram .edgeLabel,
svg.classDiagram .edgeLabel span,
svg.classDiagram .edgeTerminals foreignObject div,
svg.erDiagram .edgeLabel,
svg.erDiagram .edgeLabel span {
  font-size: 11px !important;
  color: var(--color-text-tertiary) !important;
}
/* Box outlines, row stripes, dividers — all rendered as <path> with inline attrs.
   Mermaid's '#id .node path { fill:... }' CSS beats fill="none" attr — force fill:none. */
svg.classDiagram .node path[stroke]:not([stroke="none"]),
svg.classDiagram .divider path,
svg.erDiagram .node path[stroke]:not([stroke="none"]),
svg.erDiagram .divider path {
  stroke: var(--color-border-tertiary) !important;
  stroke-width: 0.5px !important;
  fill: none !important;
}
/* classDiagram: box fill (inside .basic.label-container). Mermaid's inline CSS
   '#id .node path { stroke:... }' beats the stroke="none" attr (SVG attrs have
   lowest specificity), and the fill path is open (no Z) so the phantom stroke
   only paints top/right/bottom — left edge looks darker. Kill the stroke. */
svg.classDiagram .node .basic path[fill]:not([fill="none"]) {
  fill: var(--color-background-primary) !important;
  stroke: none !important;
  stroke-width: 0 !important;
}
/* erDiagram: header row (anonymous first-child <g>) uses secondary bg */
svg.erDiagram .node > g:first-child > path[fill]:not([fill="none"]) {
  fill: var(--color-background-secondary) !important;
}
/* erDiagram: row stripes */
svg.erDiagram .row-rect-odd path[fill]:not([fill="none"]) {
  fill: var(--color-background-primary) !important;
}
svg.erDiagram .row-rect-even path[fill]:not([fill="none"]) {
  fill: var(--color-background-secondary) !important;
}
/* Connector lines */
svg.erDiagram .relationshipLine,
svg.classDiagram .relation {
  stroke: var(--color-text-tertiary) !important;
  stroke-width: 1px !important;
}
svg.classDiagram .marker,
svg.classDiagram marker path,
svg.erDiagram .marker,
svg.erDiagram marker path {
  stroke: var(--color-text-tertiary) !important;
  stroke-width: 1px !important;
}
svg.classDiagram marker path[fill]:not([fill="none"]):not([fill="transparent"]),
svg.erDiagram marker path[fill]:not([fill="none"]):not([fill="transparent"]) {
  fill: var(--color-text-tertiary) !important;
}
/* Relationship label background — kill default 0.7 opacity */
svg.classDiagram .labelBkg,
svg.erDiagram .labelBkg {
  background-color: var(--color-background-primary) !important;
  opacity: 1 !important;
}

/* Action buttons group.

   Popover items: Copy to clipboard, Download file, Save as artifact. */
#action-btns {

/* display:flex above would override UA [hidden] — restore it */

body:hover #action-btns {
  opacity: 1;
}
/* 28×28 chip style for the ⋯ trigger.
   bg-100 at rest (visible over widget content), bg-300 on hover.
   No border — bg change is enough hover feedback. Transparent border stays
   for layout stability. Fallback light-dark() values match the design-system
   --bg-100/--bg-300 tokens (widget iframe doesn't receive them via host
   context, only --color-background-* semantic vars). */
#action-btns > button {
  width: 28px;
  height: 28px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--border-radius-sm, 6px);
  background: var(--bg-100, light-dark(#faf9f5, #262624));
  border: 1px solid transparent;
  color: var(--color-text-secondary, #3d3d3a);
  cursor: pointer;
  transition: background 0.15s ease;
}
#action-btns > button:hover {
  background: var(--bg-300, light-dark(#f0eee6, #141413));
}
/* Popover — drops down-left from the trigger.
   Styled to match the native claude.ai Radix dropdown: white bg, backdrop
   blur, 0.5px border, subtle shadow. Items are single-line icon + label,
   matching the conversation menu (Star/Rename/Add to project). */
#more-popover {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  min-width: 8rem;
  padding: 6px;
  border-radius: 12px;
  background: var(--color-background-primary, #fff);
  border: 0.5px solid var(--color-border-secondary, rgba(0, 0, 0, 0.1));
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 2px 8px light-dark(rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.24));
  font-family: var(--font-sans, system-ui);
  color: var(--color-text-secondary, #3d3d3a);
  opacity: 0;
  visibility: hidden;
  transform: translateY(-4px);
  transition:
    opacity 0.15s ease,
    transform 0.15s ease,
    visibility 0s linear 0.15s;
}
/* Reveal only when hovering the ⋯ trigger or the popover itself. A 4px
   dead-zone between trigger and popover would close it, so
   #more-popover:hover keeps it open during the crossing. */
#more-btn:hover ~ #more-popover,
#more-popover:hover {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
  transition:
    opacity 0.15s ease,
    transform 0.15s ease,
    visibility 0s;
}
/* Popover items — single-line icon + label, matching native dropdown menu */
.more-item {

  {id:25,cat:"困境心态",text:"你人生遭遇了重大挫折，例如失业或失恋，你会：",opts:["很快振作，把挫折变成成长的动力","向朋友倾诉宣泄，寻求支持","长期低落，一直在内耗","整活，把自己的惨变成素材"],scores:[{ambi:1,ideal:1},{light:1,mundane:1},{dark:1,mundane:1},{chaos:1}]},
  {id:26,cat:"价值观",text:"以下哪种信念最接近你的人生观：",opts:["任何时候都要坚守原则，不能妥协","目的正确，手段可以灵活","活在当下，别想那么多","规则是为了打破而存在的"],scores:[{order:1,ideal:1},{ambi:1,order:1},{mundane:1},{chaos:1,dark:1}]},
  {id:27,cat:"复仇幻想",text:"你受到了一次严重的不公正对待，你的第一反应是：",opts:["用正当手段维权，寻求合理的解决途径","记在心里，找准时机给一记回击","接受现实，消化情绪然后继续前进","设计一场让对方出丑的完美复仇剧情"],scores:[{order:1,light:1},{dark:1,order:1},{mundane:1},{chaos:1,dark:1}]},

const CHAMPS = {
  lkz:{name:"拉克丝",nick:"灭国魔女",align:"混乱善良",tags:["光明","混沌","理想化"],color:"teal",quote:"都晾起来吧！",desc:"你美丽而充满善意，却时常在浑然不觉中掀起波澜。就像拉克丝——明明是德玛西亚的好姑娘，却莫名其妙走上灭国之路。你行事凭直觉，心地善良，但你的「帮忙」有时候会把事情搞得比原来更复杂。世界因你而更有趣，虽然不一定是好事。",similar:[{name:"维迦",why:"嘴上邪恶心里光明"},{name:"维克托",why:"初衷善良但容易走偏"}]},
  jkz:{name:"金克丝",nick:"混世魔王",align:"混乱邪恶",tags:["混沌","黑暗","冲动"],color:"coral",quote:"金克丝的含义就是金克丝",desc:"你敏感、自傲，情绪化却极具感染力。就像金克丝——不是真的坏人，只是用炸弹表达关心。你对世界有种独特的解读方式，有时令人抓狂，有时又莫名令人共情。你不按常理出牌，是人群中最不可预测也最令人难忘的那一个。",similar:[{name:"费德提克",why:"同样混沌、令人心惊"},{name:"崔斯特",why:"同样随性不按套路"}]},
  md:{name:"蒙多",nick:"笨蛋美人",align:"混乱中立",tags:["混沌","平常心","自由"],color:"gray",quote:"蒙多想去哪就去哪",desc:"你是自由自在的小精灵，脑回路与常人不同，但有种令人羡慕的豁达。就像蒙多——不是不聪明，只是有自己的逻辑。你不太在乎别人怎么看，只要自己开心就够了。在压力与规则面前，你能找到属于自己的出口。",similar:[{name:"崔斯特",why:"同样随遇而安"},{name:"妮蔻",why:"同样多面自由"}]},
  lflan:{name:"乐芙兰",nick:"点子王",align:"中立邪恶",tags:["黑暗","世俗化","谋略"],color:"pink",quote:"而我知道谁在幕后",desc:"你热衷于勾心斗角，精通权谋，但往往高估了局势的复杂程度。就像乐芙兰——野心满满，点子多多，却活不过甄嬛传第二集。你有着超强的洞察力和策略思维，只是有时候把简单问题想复杂了，最后反被自己的聪明所误。",similar:[{name:"斯维因",why:"同样精于权谋算计"},{name:"梅尔",why:"同样擅长政治游戏"}]},
  svn:{name:"斯维因",nick:"大统领",align:"守序邪恶",tags:["守序","黑暗","上进心"],color:"red",quote:"诺克萨斯要你站起来，在荣耀中重获新生",desc:"你是乱世枭雄，目标明确、手腕强硬。就像斯维因——愿意与恶魔交易换取更大的力量，因为你相信自己的目的足够正确。你有强烈的使命感和统治欲，擅长在复杂局势中找到突破口，是那种能把混乱变成机遇的人。",similar:[{name:"阿兹尔",why:"同样是天生统治者"},{name:"烬",why:"同样有强烈的目标感"}]},
  zx:{name:"赵信",nick:"德邦总管",align:"中立善良",tags:["光明","守序","忠义"],color:"amber",quote:"谨记刀枪可折，斗志不可破",desc:"你是忠义之人，踏实可靠，是那种「一说到底」的朋友。就像赵信——上司让干什么干什么，但有自己坚守的底线。你不喜欢玩弄心机，更相信用实力说话。在别人需要你的时候，你永远都在。",similar:[{name:"盖伦",why:"同样忠义可靠"},{name:"艾克",why:"同样有担当与正义感"}]},
  tm:{name:"塔姆",nick:"大胃袋",align:"中立邪恶",tags:["混沌","黑暗","平常心"],color:"green",quote:"我的小胃袋，会变成你的小胃袋",desc:"你的人生哲学非常简单：吃好喝好，钱够花就行。就像塔姆——看似简单粗暴，内里自有一套逻辑。你不追求宏大叙事，但在关键时刻往往是出人意料的存在。喜欢「吃」的你，在某种意义上消化了很多别人消化不了的东西。",similar:[{name:"蒙多",why:"同样简单自在"},{name:"费德提克",why:"同样出人意料"}]},
  sls:{name:"塞拉斯",nick:"解脱者",align:"混乱善良",tags:["光明","混沌","理想化","上进心"],color:"purple",quote:"兄弟姐妹们，奋起抗争！",desc:"你有强烈的正义感，是天生的革命者。就像塞拉斯——曾经的受害者，后来的领袖，每一步都在为心中的理想燃烧。你不能忍受不公正，愿意站出来为他人发声，但你的激情有时候会让你走得太快，把同伴甩在身后。",similar:[{name:"维克托",why:"同样有崇高理想"},{name:"艾克",why:"同样充满正义与担当"}]},
  fdt:{name:"费德提克",nick:"拉克丝光明面",align:"混乱邪恶",tags:["混沌","黑暗","恐惧化身"],color:"red",quote:"恐惧！！！！",desc:"你是混乱的化身，用「恐惧」包裹内心的柔软。就像费德提克和拉克丝的奇妙关系——表面凶神恶煞，实际上只是用独特的方式在与世界沟通。你的存在让人心惊，却也莫名令人着迷，是人群中那个无法被定义的谜。",similar:[{name:"金克丝",why:"同样混沌令人难以捉摸"},{name:"妮蔻",why:"同样多变难以定义"}]},
  yzrl:{name:"伊泽瑞尔",nick:"探险家",align:"守序善良",tags:["光明","理想化","上进心"],color:"blue",quote:"该出击啦",desc:"你热爱探索世界，充满好奇心，有点小自恋但魅力十足。就像伊泽瑞尔——明明靠才华就能搞定，却偏要走遍天涯才算满足。你对新鲜事物永远保持热情，相信世界上还有很多地方和可能等着你去发现。",similar:[{name:"黑默丁格",why:"同样热爱探索与进步"},{name:"塞拉斯",why:"同样充满热情"}]},
  ml:{name:"梅尔",nick:"长袖善舞",align:"守序中立",tags:["守序","世俗化","洞察"],color:"amber",quote:"感受米达尔达的怒火",desc:"你精通权术，游走于各方势力之间，却始终保持本心。就像梅尔——皮城最聪明的政客，知道所有人的底牌，却选择用它来维持平衡而不是破坏。你是那种在复杂局面中最先看清全局的人，处理人际关系得心应手。",similar:[{name:"斯维因",why:"同样精于权谋"},{name:"阿兹尔",why:"同样有战略眼光"}]},
  azr:{name:"阿兹尔",nick:"沙漠皇帝",align:"守序中立",tags:["守序","理想化","上进心"],color:"amber",quote:"恕瑞玛，你的皇帝回来了",desc:"你是天生的领导者，有宏大的理想和充沛的行动力。就像阿兹尔——带着文明的梦想死而复生。你有强烈的使命感，有时候过于自信，但那种「开疆拓土」的气魄是你最大的魅力。你相信只要努力，荒原也能变帝国。",similar:[{name:"斯维因",why:"同样是乱世枭雄"},{name:"盖伦",why:"同样有强烈责任感"}]},
  timo:{name:"提莫",nick:"云南波比",align:"混乱善良",tags:["混沌","光明","破坏王"],color:"green",quote:"我生来就是提莫，这是命中注定",desc:"你可爱、灵动，表面人畜无害，实则破坏力惊人。就像提莫——全图最烦的存在，但你就是很难讨厌他。你有种天然的「祸害」气质，总能在出人意料的时候整一件大事，然后用无辜的眼神说「我不是故意的」。",similar:[{name:"妮蔻",why:"同样多变难以捉摸"},{name:"金克丝",why:"同样破坏力拉满"}]},
  fyg:{name:"佛耶戈",nick:"纯爱战神",align:"混乱中立",tags:["混沌","黑暗","感性"],color:"gray",quote:"永失吾爱，举目破败",desc:"你敏感深情，内心藏着一片废墟。就像佛耶戈——用破败的形态守护着最深切的爱。你对感情极为认真，失去时会以整个世界为代价哀悼。你的深情让人动容，你的破败让人心碎，这两者在你身上奇妙地共存。",similar:[{name:"金克丝",why:"同样敏感而极端"},{name:"塞拉斯",why:"同样因爱而燃烧"}]},
  jin:{name:"烬",nick:"戏命师",align:"守序邪恶",tags:["守序","黑暗","美学"],color:"gray",quote:"我于杀戮之中释放，亦如黎明之中的花朵",desc:"你极度精致，有强烈的美学追求，但你的精致用在了什么地方——最好别问。就像烬——优雅地执行着最残酷的任务。你对「美」有偏执，相信形式本身就是一种意义，别人看不透你，但你从不在乎别人是否看透。",similar:[{name:"乐芙兰",why:"同样优雅而算计"},{name:"斯维因",why:"同样目标清晰手段冷硬"}]},
  wkt:{name:"维克托",nick:"祖安耶稣",align:"混乱善良",tags:["混沌","理想化","上进心"],color:"blue",quote:"接受光荣的进化",desc:"你有崇高的理想，愿意为了「更大的善」走偏。就像维克托——出发点是造福全人类，但「进化」二字走到最后有点让人不安。你充满使命感，创造欲旺盛，相信未来可以被设计。唯一的隐患是：你可能低估了走火入魔的风险。",similar:[{name:"塞拉斯",why:"同样有崇高理想"},{name:"黑默丁格",why:"同样热衷于科学与进步"}]},
  wj:{name:"维迦",nick:"邪恶小法师",align:"混乱善良",tags:["混沌","光明","言行不一"],color:"teal",quote:"如果我们位置互换，我会让你知道什么叫残忍",desc:"你嘴上说着坏话，心里却比任何人都善良。就像维迦——魔丸心，灵珠命，做了0件坏事却天天嚷嚷「我超凶的」。你是朋友圈里那种「嘴欠但靠谱」的存在，越是在乎的人越会假装不在乎，但需要你的时候你永远都在。",similar:[{name:"拉克丝",why:"同样善良但混乱"},{name:"提莫",why:"同样人畜无害却有破坏力"}]},
  ak:{name:"艾克",nick:"时间刺客",align:"守序善良",tags:["守序","光明","上进心","正义"],color:"purple",quote:"我宁愿犯错，也不愿什么都不做",desc:"你有强烈的责任感和正义感，相信行动比犹豫更有价值。就像艾克——哪怕出身底层，也要逆天改命。你不是那种坐等机会的人，有问题就解决，有不公就对抗。你的行动力和担当感让你在困境中依然保持方向。",similar:[{name:"塞拉斯",why:"同样出身困境、充满抗争精神"},{name:"赵信",why:"同样忠义有担当"}]},
  tlk:{name:"塔里克",nick:"攀登者",align:"守序善良",tags:["守序","光明","浪漫"],color:"teal",quote:"我曾踏足山巅，也曾跌入低谷，二者都让我受益良多",desc:"你博爱、优雅、有点自恋，守护艺术与美是你的天职。就像塔里克——用宝石与光芒温暖整个世界，对每一个人都真诚相待。你相信美好本身就是一种力量，你的存在让周围的人感到被珍视。稍微有点过于相信自己的魅力，但这也是你的可爱之处。",similar:[{name:"伊泽瑞尔",why:"同样有点自恋但魅力十足"},{name:"萨勒芬妮",why:"同样散发正向能量"}]},
  hmdc:{name:"黑默丁格",nick:"大发明家",align:"守序善良",tags:["守序","理想化","上进心"],color:"blue",quote:"为了伟大的科学",desc:"你理性、睿智，热爱研究，沉迷进步之美。就像黑默丁格——你对知识的热情永不熄灭，总在为人类的未来贡献脑细胞。你相信任何问题都有解决方案，只要肯思考。有时候会忘了吃饭，但那是因为你正在做更重要的事。",similar:[{name:"维克托",why:"同样热爱科学与进步"},{name:"艾克",why:"同样相信知识可以改变命运"}]},
  slf:{name:"萨勒芬妮",nick:"女明星",align:"守序善良",tags:["光明","守序","高能量"],color:"pink",quote:"我们不如一起唱歌吧",desc:"你阳光灿烂，能量充沛，是人群中的太阳。就像萨勒芬妮——无论走到哪里都能带动气氛。你对生活充满热情，善于发现美好，是朋友圈里最能带动情绪的那一个。你的快乐是真实的，你的正能量是发自内心的。",similar:[{name:"塔里克",why:"同样散发温暖光芒"},{name:"拉克丝",why:"同样充满善意与活力"}]},
  gl:{name:"盖伦",nick:"德邦城墙",align:"守序善良",tags:["守序","光明","责任感"],color:"blue",quote:"正义，要么靠法律，要么靠武力",desc:"你勇敢、高贵、富有责任感，是朋友中最可靠的那堵墙。就像盖伦——扛起德玛西亚的荣耀，从不动摇。你相信秩序与正义，做事一板一眼，是那种「说到做到」的代名词。在乱世中你是稳定的锚，在危难时你是第一个站出来的人。",similar:[{name:"赵信",why:"同样忠义可靠"},{name:"艾克",why:"同样有正义与担当"}]},
  ctst:{name:"崔斯特",nick:"卡牌大师",align:"混乱中立",tags:["混沌","世俗化","随性"],color:"amber",quote:"这不是好运，是命运",desc:"你好赌，喜欢浪迹天涯，把命运交给了骰子。就像崔斯特——你不是没有能力，只是不想被计划束缚。随性中透着潇洒，漂泊中带着浪漫。你相信命运自有安排，而那张翻开的牌，说不定就是你的大运。",similar:[{name:"蒙多",why:"同样随遇而安"},{name:"佛耶戈",why:"同样对命运有独特理解"}]},
  nk:{name:"妮蔻",nick:"百变大咖",align:"混乱善良",tags:["混沌","光明","多面"],color:"pink",quote:"打架时间！",desc:"你变化莫测，万花筒般的个性让人永远猜不透下一面的你是什么样子。就像妮蔻——每一次变身都是新的惊喜。你不会被单一标签定义，在不同场合会呈现完全不同的面貌，这既是你的魅力，也是你的自由。",similar:[{name:"崔斯特",why:"同样随性多变"},{name:"提莫",why:"同样令人捉摸不透"}]}

};

const app=document.getElementById("app");

function calcChamp(){
  const acc={light:0,dark:0,chaos:0,order:0,ideal:0,mundane:0,ambi:0};
  Qs.forEach(q=>{
    const i=ans[q.id];
    if(i===undefined)return;
    const s=q.scores[i]||{};
    Object.keys(s).forEach(k=>acc[k]=(acc[k]||0)+s[k]);
  });
  let best=null,bestScore=-Infinity;
  Object.keys(SCORING_MATRIX).forEach(cid=>{
    const mat=SCORING_MATRIX[cid];
    let sc=0;
    Object.keys(mat).forEach(k=>sc+=((acc[k]||0)*mat[k]));
    if(sc>bestScore){bestScore=sc;best=cid;}
  });
  return {id:best,acc};
}

function getAxisPct(acc){
  const lTotal=(acc.light||0)+(acc.dark||0)||1;
  const cTotal=(acc.chaos||0)+(acc.order||0)||1;
  const iTotal=(acc.ideal||0)+(acc.mundane||0)||1;
  const aTotal=(acc.ambi||0)||(1);
  return [
    {left:"光明",right:"黑暗",pct:Math.round(((acc.light||0)/lTotal)*100),label:"光暗倾向"},
    {left:"混沌",right:"守序",pct:Math.round(((acc.chaos||0)/cTotal)*100),label:"秩序感"},
    {left:"理想化",right:"世俗化",pct:Math.round(((acc.ideal||0)/iTotal)*100),label:"价值取向"},
    {left:"上进心",right:"平常心",pct:Math.round(((acc.ambi||0)/(aTotal+5))*100),label:"人生驱动力"},
  ];
}

  }
  if(phase==="result"){

        </div>
        <button class="restart-btn" onclick="restart()">重新测试</button>
      </div>
    </div>`;
    const wrap=document.getElementById("hero-img-wrap");
    const ph=document.getElementById("img-placeholder");
    if(imgFile&&wrap){
      const img=document.createElement("img");
      img.onload=()=>{if(ph)ph.remove();};
      img.onerror=()=>{if(ph)ph.textContent="暂无图片";};

      wrap.appendChild(img);
    }
  }
}
